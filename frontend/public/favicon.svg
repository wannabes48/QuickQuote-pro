<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#grad)"/>
  
  <g filter="url(#shadow)">
    <!-- Q ring -->
    <circle cx="240" cy="240" r="110" fill="none" stroke="white" stroke-width="60" />
    <!-- Q tail -->
    <path d="M 315 315 L 390 390" stroke="white" stroke-width="60" stroke-linecap="round" />
    <!-- Inner accent -->
    <circle cx="240" cy="240" r="30" fill="white" />
  </g>
</svg>